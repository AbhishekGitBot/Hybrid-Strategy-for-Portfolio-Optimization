<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty 50 Analytics Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --background-color: #f8f9fd;
            --card-background: #ffffff;
            --text-color: #2d3436;
            --accent-color: #6c5ce7;
            --success-color: #00b894;
            --danger-color: #d63031;
            --grid-gap: 20px;
            --border-radius: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background-color: var(--card-background);
            padding: 2rem;
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }
        
        .nav-item {
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-item:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .main-content {
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .date-picker {
            padding: 0.5rem 1rem;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--border-radius);
            font-size: 1rem;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--grid-gap);
            margin-bottom: 2rem;
        }
        
        .metric-card {
            background-color: var(--card-background);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .metric-title {
            font-size: 0.875rem;
            color: var(--text-color);
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--grid-gap);
        }
        
        .chart-card {
            background-color: var(--card-background);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .chart-container {
            width: 100%;
            height: 400px;
        }
        
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo">JP Morgan Chase</div>
            <div class="nav-item">Dashboard</div>
            <div class="nav-item">Portfolio</div>
            <div class="nav-item">Analysis</div>
            <div class="nav-item">Reports</div>
            <div class="nav-item">Settings</div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>Nifty 50 Analytics</h1>
                <input type="date" class="date-picker" min="2023-01-01" max="2024-10-31">
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-title">Current Value</div>
                    <div class="metric-value">19,745.20</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Daily Change</div>
                    <div class="metric-value" style="color: var(--success-color)">+1.2%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Volume</div>
                    <div class="metric-value">234.5M</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Volatility</div>
                    <div class="metric-value">12.3%</div>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-card">
                    <h2 class="chart-title">Price Movement</h2>
                    <div class="chart-container" id="time-series-plot"></div>
                </div>
                
                <div class="chart-card">
                    <h2 class="chart-title">Returns Distribution</h2>
                    <div class="chart-container" id="log-returns-plot"></div>
                </div>
                
                <div class="chart-card">
                    <h2 class="chart-title">Correlation Matrix</h2>
                    <div class="chart-container" id="correlation-heatmap"></div>
                </div>
                
                <div class="chart-card">
                    <h2 class="chart-title">Distance Matrix</h2>
                    <div class="chart-container" id="distance-heatmap"></div>
                </div>
                
                <div class="chart-card">
                    <h2 class="chart-title">MDS Analysis</h2>
                    <div class="chart-container" id="mds-plot"></div>
                </div>
                
                <div class="chart-card">
                    <h2 class="chart-title">K-Means Clustering</h2>
                    <div class="chart-container" id="kmeans-plot"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const datePicker = document.querySelector('.date-picker');
            
            // Set default date to today
            const today = new Date();
            datePicker.value = today.toISOString().split('T')[0];
            
            function getColor(varName) {
                return getComputedStyle(document.documentElement)
                    .getPropertyValue(varName).trim();
            }

            // Generate sample Nifty 50 data
            function generateNiftyData() {
                const dates = Array.from({length: 252}, (_, i) => {
                    const date = new Date(2023, 0, 1);
                    date.setDate(date.getDate() + i);
                    return date;
                });
                
                // More realistic Nifty 50 starting point and movement
                const baseValue = 18000;
                const prices = [baseValue];
                
                for (let i = 1; i < 252; i++) {
                    const dailyReturn = (Math.random() - 0.5) * 0.02; // 2% daily volatility
                    prices.push(prices[i-1] * (1 + dailyReturn));
                }
                
                return { dates, prices };
            }
            
            function calculateLogReturns(prices) {
                return prices.slice(1).map((price, i) => 
                    Math.log(price / prices[i])
                );
            }
            
            function updateCharts() {
                const data = generateNiftyData();
                const logReturns = calculateLogReturns(data.prices);
                
                // Time Series Plot with candlestick-style
                Plotly.newPlot('time-series-plot', [{
                    x: data.dates,
                    y: data.prices,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Nifty 50',
                    line: { 
                        color: getColor('--primary-color'),
                        width: 2
                    },
                    fill: 'tonexty',
                    fillcolor: `${getColor('--primary-color')}10`
                }], {
                    margin: { t: 20, r: 20, b: 40, l: 40 },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    xaxis: {
                        showgrid: true,
                        gridcolor: 'rgba(0,0,0,0.05)'
                    },
                    yaxis: {
                        showgrid: true,
                        gridcolor: 'rgba(0,0,0,0.05)'
                    }
                });
                
                // Other plots...
                // Similar styling updates for other visualizations
                // Will include correlation matrix, distance matrix, MDS, and K-means
                // with consistent styling
            }
            
            // Initialize charts
            updateCharts();
            
            // Update on date change
            datePicker.addEventListener('change', updateCharts);
        });
    </script>
</body>
</html>
